---
name: docs

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# automatically cancel in-progress builds if another commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# default to 0 permissions
# (job-level overrides add the minimal permissions needed)
permissions:
  contents: none

jobs:
  check-docs:
    name: check-docs
    runs-on: ubuntu-slim
    permissions:
      contents: read
    steps:
      - name: check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: conda-incubator/setup-miniconda@8ee1f361103df19b6f8c8655fd3967a8ecb162d5 # v3.1.0
        with:
          environment-file: docs/env.yml
          activate-environment: pydistcheck-docs
          miniforge-version: latest
      - name: build docs
        shell: bash -l {0}
        run: |
          pip install .
          make -C ./docs html
          python -m sphinx -b linkcheck -D linkcheck_timeout=5 --fail-on-warning ./docs ./linkcheck_output
  check-links:
    name: check-links
    runs-on: ubuntu-slim
    permissions:
      contents: read
    steps:
      # cache Lychee results to avoid hitting rate limits
      - name: Restore lychee cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Lychee URL checker
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: >-
            --cache
            --no-progress
            --timeout 10
            --max-retries 2
            --accept 200,429
            --exclude-path docs/conf.py
            './**/*.rst'
            './**/*.md'
            './**/*.py'
            './**/*.toml'
            './**/*.yml'
          # fail the action on broken links
          fail: true
          failIfEmpty: true
  all-docs-tests-successful:
    if: always()
    runs-on: ubuntu-slim
    needs:
      - check-docs
      - check-links
    permissions:
      statuses: read
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
